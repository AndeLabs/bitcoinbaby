# BitcoinBaby Workers - Production Configuration
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "bitcoinbaby-api"
main = "src/index.ts"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat"]
account_id = "58f90adc571d31c4b7a860b6edef3406"

# Development
[dev]
port = 8787
local_protocol = "http"

# Durable Objects - Virtual Balance & Game State
[[durable_objects.bindings]]
name = "VIRTUAL_BALANCE"
class_name = "VirtualBalanceDO"

[[durable_objects.bindings]]
name = "WITHDRAW_POOL"
class_name = "WithdrawPoolDO"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoomDO"

# Migrations for Durable Objects
[[migrations]]
tag = "v1"
new_sqlite_classes = ["VirtualBalanceDO", "WithdrawPoolDO", "GameRoomDO"]

# =============================================================================
# KV Namespace - REQUIRED for proof deduplication security
# =============================================================================
# SETUP INSTRUCTIONS:
# 1. Create KV namespace: wrangler kv:namespace create CACHE
# 2. Create preview namespace: wrangler kv:namespace create CACHE --preview
# 3. Update the IDs below with the output from the commands
# 4. Deploy: wrangler deploy
#
# SECURITY: Without KV, same proof can be submitted to multiple addresses!
# =============================================================================
[[kv_namespaces]]
binding = "CACHE"
id = "c1629ef515ec48a0a2c2ef6872ea3ea3"
preview_id = "4b529987b0fe4a18a128f5ecc9a8a2ce"

# Scheduled tasks (Cron) - Consolidated to stay under free tier limit (5)
# All tasks handled in one cron, logic in handleScheduled()
[triggers]
crons = [
  # Single cron every 6 hours - handles daily/weekly resets and fee checks
  "0 */6 * * *"
]

# Environment variables
[vars]
ENVIRONMENT = "development"
MIN_WITHDRAW_AMOUNT = "100"
POOL_PERIOD_DAYS = "7"
MAX_FEE_RATE_SAT_VB = "10"
# Charms Prover API
# NOTE: Public prover.charms.dev may not be accessible
# For local development, run: charms server (localhost:17784)
# For production, contact Charms Inc. for hosted prover access
PROVER_URL = "http://localhost:17784"
# Treasury address - holds BABTC for batch withdrawals
# Must be funded with tokens before batch processing works
TREASURY_ADDRESS = ""

# Production environment
[env.production]
name = "bitcoinbaby-api-prod"

# Durable Objects for production
[[env.production.durable_objects.bindings]]
name = "VIRTUAL_BALANCE"
class_name = "VirtualBalanceDO"

[[env.production.durable_objects.bindings]]
name = "WITHDRAW_POOL"
class_name = "WithdrawPoolDO"

[[env.production.durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoomDO"

# Migrations for production
[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["VirtualBalanceDO", "WithdrawPoolDO", "GameRoomDO"]

[env.production.vars]
ENVIRONMENT = "production"
MIN_WITHDRAW_AMOUNT = "100"
POOL_PERIOD_DAYS = "7"
MAX_FEE_RATE_SAT_VB = "5"
# Charms Prover API
PROVER_URL = "https://prover.charms.dev"
# Treasury address - Set via secret for production:
# wrangler secret put TREASURY_ADDRESS --env production
TREASURY_ADDRESS = ""

# Production KV namespace (shared with development - same dedup across all envs)
[[env.production.kv_namespaces]]
binding = "CACHE"
id = "c1629ef515ec48a0a2c2ef6872ea3ea3"

# Production cron - consolidated to single trigger
[env.production.triggers]
crons = ["0 */6 * * *"]

# =============================================================================
# SECRETS - Set via: wrangler secret put SECRET_NAME --env production
# =============================================================================
# Required for NFT Marketplace:
#   UPSTASH_REDIS_REST_URL - Redis URL for leaderboard/listings cache
#   UPSTASH_REDIS_REST_TOKEN - Redis auth token
#
# Required for Charms integration:
#   SCROLLS_API_KEY - API key for Charms Scrolls
#
# Required for withdrawals/batch minting:
#   BATCH_WALLET_SEED - Seed for batch transaction signing (NEVER commit!)
#   TREASURY_ADDRESS - Address holding BABTC for batch transfers
#
# Optional:
#   ADMIN_KEY - Admin API key for reset endpoints
#   PROVER_URL - Custom Prover API URL (default: https://prover.charms.dev)
#
# =============================================================================
# BABTC Token Configuration (Testnet4)
# =============================================================================
