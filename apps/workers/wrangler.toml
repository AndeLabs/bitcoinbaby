# Platform fee percentage for claims (20% = extra output to foundation)
PLATFORM_FEE_PERCENT = "20"
# Genesis Babies NFT configuration
# NOTE: These are placeholder values - update after NFT contract deployment
# Genesis Babies NFT - VK from compiled contract
# APP_ID will be established by first mint (SHA256 of funding UTXO)
