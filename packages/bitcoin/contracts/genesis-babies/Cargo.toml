[package]
name = "genesis-babies"
version = "1.0.0"
edition = "2021"
description = "Genesis Babies NFT Contract for BitcoinBaby on Charms"
authors = ["BitcoinBaby Team"]
license = "MIT"

[lib]
name = "genesis_babies"

[dependencies]
# Charms SDK - v11 for V11 prover
charms-sdk = { version = "11.0" }

[profile.release]
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"
overflow-checks = true

# Empty [workspace] section to make this a "top-level" project
[workspace]
