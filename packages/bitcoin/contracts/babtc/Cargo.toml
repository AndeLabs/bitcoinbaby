[package]
name = "babtc-contract"
version = "0.1.0"
edition = "2021"
description = "BABTC Token Contract for BitcoinBaby mining rewards"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
# Charms SDK for zkVM-based smart contracts
charms-sdk = "0.10"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Cryptographic primitives
sha2 = "0.10"
hex = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

# SP1 zkVM target configuration
# Build with: cargo build --release --target wasm32-unknown-unknown
[target.wasm32-unknown-unknown]
rustflags = ["-C", "link-arg=-s"]
