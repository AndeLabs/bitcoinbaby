name: Deploy

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # =============================================================================
  # BUILD & DEPLOY TO VERCEL
  # =============================================================================
  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'staging' || 'production') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=${{ github.event.inputs.environment || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_NETWORK: ${{ vars.NEXT_PUBLIC_NETWORK || 'testnet4' }}
          NEXT_PUBLIC_DEV_FUND_ADDRESS: ${{ vars.NEXT_PUBLIC_DEV_FUND_ADDRESS }}
          NEXT_PUBLIC_STAKING_POOL_ADDRESS: ${{ vars.NEXT_PUBLIC_STAKING_POOL_ADDRESS }}

      - name: Deploy to Vercel (Preview)
        if: github.event.inputs.environment != 'production' && !startsWith(github.ref, 'refs/tags/')
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        if: github.event.inputs.environment == 'production' || startsWith(github.ref, 'refs/tags/')
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # =============================================================================
  # BUILD MOBILE APP (Capacitor)
  # =============================================================================
  build-mobile:
    name: Build Mobile App
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @bitcoinbaby/web build
        env:
          NEXT_PUBLIC_NETWORK: ${{ vars.NEXT_PUBLIC_NETWORK || 'testnet4' }}

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Cocoapods
        run: gem install cocoapods

      - name: Sync Capacitor iOS
        run: |
          cd apps/web
          npx cap sync ios

      - name: Build iOS App
        run: |
          cd apps/web/ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archivePath build/App.xcarchive archive CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS Build
        uses: actions/upload-artifact@v6
        with:
          name: ios-build
          path: apps/web/ios/App/build/
          retention-days: 30

  # =============================================================================
  # CREATE RELEASE
  # =============================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy-web]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
