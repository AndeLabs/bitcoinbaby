version: 2
updates:
  # Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      development:
        patterns:
          - "@types/*"
          - "typescript"
          - "eslint*"
          - "prettier"
          - "vitest"
          - "@vitejs/*"
      react:
        patterns:
          - "react*"
          - "next*"
          - "@next/*"
      bitcoin:
        patterns:
          - "bitcoinjs*"
          - "bip*"
          - "tiny-secp256k1"
          - "ecpair"
    labels:
      - "dependencies"
      - "automated"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "ci"
      - "automated"
